<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responsive web page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col bg-gray-50 text-gray-800">

  <header class="bg-white shadow">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a href="#" class="text-2xl font-extrabold text-indigo-600">GAMESTORE</a>

      <nav class="hidden md:flex space-x-8 text-gray-600">
        <a href="#" class="hover:text-indigo-600">Home</a>
        <a href="#" class="hover:text-indigo-600">About</a>
        <a href="#" class="hover:text-indigo-600">Services</a>
        <a href="#" class="hover:text-indigo-600">Contact</a>
      </nav>

      <div class="md:hidden">
        <button id="menu-btn" aria-expanded="false" aria-controls="mobile-menu" class="p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <svg id="menu-open" class="h-6 w-6 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg id="menu-close" class="h-6 w-6 text-gray-700 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="md:hidden px-6 pb-4 hidden">
      <nav class="flex flex-col space-y-2 text-gray-700">
        <a href="#" class="block py-2">Home</a>
        <a href="#" class="block py-2">About</a>
        <a href="#" class="block py-2">Services</a>
        <a href="#" class="block py-2">Contact</a>
      </nav>
    </div>
  </header>
  <main class="flex-1">
    <section class="container mx-auto px-6 py-16">
      <div class="flex flex-col-reverse lg:flex-row items-center gap-10 lg:gap-16">
        <div class="w-full lg:w-1/2">
          <p class="mt-4 text-gray-600 max-w-prose">Desigining a responsive website</p>
         
        </div>
      </div>
       <div class="mt-6">
            <a href="#" class="inline-block bg-indigo-600 text-white px-6 py-3 rounded-md shadow hover:bg-indigo-700">Get Started</a>
          </div>
    </section>
  </main>

  <footer class="bg-white border-t">
    <div class="container mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-3 gap-6 items-start">
      <div>
        <p class="text-2xl font-bold text-indigo-600">GAMESTORE</p>
        <p class="mt-2 text-sm text-gray-600">© 2026 GAMESTORE Technologies</p>
      </div>

      <div>
        <p class="font-semibold text-gray-800">Contact</p>
        <p class="mt-2 text-gray-600">Email: <a href="mailto:contact@gamstore.example" class="text-indigo-600">contact@gamstore.example</a></p>
        <p class="text-gray-600">Phone: <a href="tel:+1234567890" class="text-indigo-600">+1 (234) 567-890</a></p>
      </div>

      <div>
        <p class="font-semibold text-gray-800">Follow</p>
        <div class="mt-2 flex space-x-4">
          <a href="@" class="text-gray-600 hover:text-indigo-600">Twitter</a>
          <a href="@" class="text-gray-600 hover:text-indigo-600">LinkedIn</a>
          <a href="@" class="text-gray-600 hover:text-indigo-600">GitHub</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuOpen = document.getElementById('menu-open');
    const menuClose = document.getElementById('menu-close');

    menuBtn && menuBtn.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('hidden');
      menuOpen.classList.toggle('hidden');
      menuClose.classList.toggle('hidden');
      menuBtn.setAttribute('aria-expanded', (!open).toString());
    });
  </script>

</body>
</html>
